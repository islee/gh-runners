name: ci

# Single source of truth: run the same pre-commit hooks CI and locally.
# Hooks: shellcheck + hadolint + ruff (lint), broker pytest (test), detect-private-key +
# gitleaks (secret scan), plus YAML/whitespace hygiene. See .pre-commit-config.yaml.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # gitleaks scans history on PRs
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pre-commit + broker dev deps
        run: pip install pre-commit -r broker/requirements-dev.txt
      - name: Run gate (lint + tests + secret scan)
        run: pre-commit run --all-files --show-diff-on-failure
